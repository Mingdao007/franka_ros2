direct_force_example_controller:
  ros__parameters:
    arm_id: "fr3"
    gazebo: true
    wrench_frame_id: "world"
    pub_decimation: 1
    start_in_force_mode: true  # Skip move-to-start, directly enter force mode

    # ---- F/T Sensor Configuration ----
    # Set to false for Jacobian-based estimation (default, well-tuned)
    # Set to true for direct F/T sensor measurement (requires ros_gz_bridge)
    use_ft_sensor: false
    ft_sensor_topic: "/world/direct_force_world/model/fr3/joint/fr3_hand_joint/sensor/fr3_ft_sensor/forcetorque"

    # ---- move-to-start (not used when start_in_force_mode = true) ----
    speed_factor: 0.3
    k_gains: [200.0, 200.0, 200.0, 200.0, 100.0, 80.0, 30.0]
    d_gains: [50.0,  50.0,  50.0,  50.0,  20.0,  15.0,  10.0]
    start_joint_configuration: [0.0, -0.3, 0.0, -2.0, 0.0, 1.7, 0.785]
    force_axis: 2  # Z-axis

    # ---- Force Reference Signal ----    
    force_desired: 5.0   # Baseline (used if waypoints empty)
    force_amplitude: 0.0 # Sine disabled
    force_frequency: 0.0
    
    # ---- 3rd Order Trajectory (Cubic Polynomial) ----
    # Closed-loop design: ends at start point for smooth cycling
    # 5N -> 8N -> 3N -> 5N (back to start, no discontinuity)
    # Total cycle: 4s × 3 transitions = 12s per period, ~2 cycles in 25s
    waypoint_forces: [5.0, 8.0, 3.0, 5.0]
    waypoint_durations: [4.0, 4.0, 4.0]  # 12s per cycle
    waypoint_loop: true
    
    # === PID Tuning Notes (with alpha=0.95 filter) ===
    # Stable range: kp: 0.025-0.04, ki: 0.002-0.008, kd: 0.004-0.01
    # Higher gains -> faster response but risk oscillation
    # Lower gains -> stable but more tracking lag
    kp: 0.03    # Final: moderate proportional
    ki: 0.005   # Final: moderate integral (for steady-state)
    kd: 0.006   # Final: moderate damping
    i_limit: 15.0
    max_command: 60.0

    command_sign: -1.0  # Press down
    lambda: 0.01  # Increased regularization to smooth force estimation

    joint_damping: [15.0, 15.0, 15.0, 15.0, 10.0, 8.0, 5.0]

    # Coriolis and D-filter settings (set to 0 to disable)
    coriolis_factor: 0.0    # 0=off, 1=full
    d_filter_alpha: 0.0     # 0=no filter, higher=more smoothing
    # CRITICAL: Disable bias calibration in Gazebo - it introduces extra offset error!
    # The official Franka pattern tau_ext_initial is for REAL ROBOT only.
    # In Gazebo, tau_meas - tau_gravity is already clean, so no bias removal needed.
    # With bias=false: RMSE=0.5341 vs bias=true: RMSE=0.6664 (20% worse)
    use_bias_calibration: false

    # Enable logging for RMSE analysis
    log_file_path: "/home/andy/franka_ros2_ws/refactor_test.csv"

hybrid_circle_force_controller:
  ros__parameters:
    arm_id: "fr3"
    gazebo: true
    ee_link: "fr3_ball_tip_tcp"
    wrench_frame_id: "world"
    pub_decimation: 1

    # Circle trajectory in desk plane (XY)
    circle_radius: 0.03
    circle_frequency: 0.1
    use_current_pose_as_center: true
    circle_center_offset_x: 0.0
    circle_center_offset_y: 0.0

    # XY position-velocity tracking gains
    kp_xy: 4000.0
    kd_xy: 160.0

    # Z-axis force PID
    force_desired: 5.0
    force_kp: 0.02
    force_ki: 0.005
    force_kd: 0.008
    i_limit: 10.0
    max_force_command: 60.0
    command_sign: -1.0
    force_filter_alpha: 0.80
    d_filter_alpha: 0.5
    lambda: 0.01

    use_bias_calibration: false

    # Descent phase: high-stiffness impedance to approach surface before circle starts
    descent_kp_xy: 6000.0
    descent_kd_xy: 200.0
    descent_kp_z: 2000.0
    descent_kd_z: 80.0
    descent_speed: 0.02        # m/s downward
    descent_contact_force: 2.0 # |Fz| threshold to transition to circle

    # Joint damping and logging
    joint_damping: [8.0, 8.0, 8.0, 8.0, 5.0, 4.0, 2.0]
    log_file_path: "/home/andy/franka_ros2_ws/hybrid_circle_force_log.csv"

    # Ink trail — RViz marker publisher (measured=blue, desired=red LINE_STRIP).
    ink_enabled: true
    ink_trail_decimation: 50
    ink_force_threshold: 1.0
    ink_line_width: 0.001
    ink_max_points: 5000

    # Contact-point alignment: project ink to paper surface in world frame.
    # direct_force_world.sdf places paper top at approximately z=0.4160.
    ink_project_to_surface: true
    ink_surface_z: 0.4160
    ink_surface_epsilon: 0.0005
    # Used only when ink_project_to_surface=false (TCP -> contact shift).
    ink_contact_offset_z: -0.03
